<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Lari</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Times New Roman', Times, serif; 
        }
        
        body { 
            background: #222; 
            overflow: hidden; 
            touch-action: none; 
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #8b0000, #ff4500);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* UI Score & Timer */
        #ui {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            text-align: right;
            font-size: 28px;
            text-shadow: 2px 2px 4px #000;
            z-index: 100;
        }
        #ui span { 
            color: #ffff00; 
            font-family: 'Courier New', Courier, monospace; 
        }

        #back-btn {
            position: absolute;
            top: 20px; 
            left: 20px;
            font-size: 30px; 
            color: white;
            text-decoration: none; 
            z-index: 100;
            border: 3px solid;
            padding: 5px;
            border-radius: 12px;
        }

        #floor {
            position: absolute;
            bottom: 20%; width: 100%;
            height: 50px; background: #000;
        }

        .lava-bg {
            position: absolute;
            bottom: 0; width: 100%; height: 20%;
            background: #ff4500; border-top: 10px solid #ff0000;
            box-shadow: 0 -10px 20px rgba(255, 69, 0, 0.5);
        }

        /* Karakter */
        #player {
            position: absolute;
            bottom: 22%;
            left: 50px;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            color: #33e6ff;
            z-index: 10;
        }

        /* Animasi */
        .warmup { 
            animation: bounce 0.5s infinite; 
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .running { animation: run-anim 0.35s infinite linear; }
        @keyframes run-anim {
            0% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg) translateY(-5px); }
            100% { transform: rotate(-5deg); }
        }

        /* Class untuk Lompat */
        .jumping { animation: jump-anim 0.6s ease-out forwards !important; }
        @keyframes jump-anim {
            0% { bottom: 20%; }
            50% { bottom: 50%; }
            100% { bottom: 20%; }
        }

        .sliding { 
            height: 40px !important; 
            transform: translateY(30px); 
        }

        /* Rintangan */
        .obstacle {
            position: absolute;
            background: #ff0000;
            border-radius: 50%;
            border: 4px solid #000;
            box-shadow: 0 0 15px black;
        }

        /* Overlay Screens */
        #game-over {
            display: none; /* Akan berubah jadi flex lewat JavaScript */
            position: fixed; /* Gunakan fixed agar mengunci seluruh layar HP */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 9999; /* Pastikan paling depan */
        }

        #start-msg {
            position: absolute;
            color: white; font-size: 30px; text-align: center;
            background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px;
        }

        /* Container Latar Belakang */
        #background-elements {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Biar nggak ngeblock klik */
            overflow: hidden;
        }

        /* Awan Bergerak */
        .cloud {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 50px;
            top: 10%;
            animation: move-bg linear infinite;
        }

        /* Bangunan/Cityscape */
        #buildings {
            position: absolute;
            bottom: 20%;
            width: 200%; /* Lebih lebar biar bisa looping */
            height: 150px;
            background-image: linear-gradient(to top, #4a0000 0%, transparent 100%);
            clip-path: polygon(0% 100%, 5% 40%, 10% 100%, 15% 20%, 20% 100%, 25% 50%, 30% 100%, 35% 30%, 40% 100%, 45% 60%, 50% 100%, 55% 20%, 60% 100%, 65% 40%, 70% 100%, 75% 10%, 80% 100%, 85% 50%, 90% 100%, 95% 30%, 100% 100%);
            opacity: 0.5;
        }

        .moving-city {
            animation: move-bg 15s linear infinite;
        }

        @keyframes move-bg {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Lava Bergejolak */
        .lava-bg {
            position: absolute;
            bottom: 0; width: 100%; height: 20%;
            background: #ff4500; 
            border-top: 10px solid #ff0000;
            box-shadow: 0 -10px 30px rgba(255, 69, 0, 0.8);
            animation: lava-flow 1.5s ease-in-out infinite;
        }

        @keyframes lava-flow {
            0%, 100% { height: 20%; filter: brightness(1); }
            50% { height: 12%; filter: brightness(1.3); }
        }

        @media (max-width: 600px) {
            #player {
                font-size: 50px;
                width: 40px;
                height: 40px;
                left: 30px;
            }

            #ui {
                font-size: 18px;
                top: 15px;
                right: 15px;
            }

            #start-msg {
                font-size: 18px;
                width: 80%;
            }

            #game-over h1 {
                font-size: 50px;
            }

            #game-over h1 {
                font-size: 40px !important; /* Ukuran lebih masuk akal untuk HP */
            }
            #game-over p {
                font-size: 18px !important;
            }

            .obstacle {
                width: 35px !important;
                height: 35px !important;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <a href="index.html" id="back-btn">←</a>
        
        <div id="ui">
            <div>Skor: <span id="score">000000</span></div>
            <div>Skor Tertinggi: <span id="high-score">000000</span></div>
            <div>Waktu: <span id="timer">0s</span></div>
        </div>

        <div id="start-msg">Tekan SPACE / Klik Layar Untuk Mulai</div>

        <div id="background-elements">
    <i class="fas fa-cloud cloud" style="left: 10%; top: 5%; animation-duration: 40s;"></i>
    <i class="fas fa-cloud cloud" style="left: 40%; top: 12%; animation-duration: 35s; font-size: 30px;"></i>
    <i class="fas fa-cloud cloud" style="left: 80%; top: 8%; animation-duration: 50s;"></i>
    
    <div id="buildings" class="moving-city"></div>
</div>

        <div id="player" class="warmup">
            <i class="fas fa-running"></i>
        </div>

        <div id="floor"></div>
        <div class="lava-bg"></div>

        <div id="game-over">
            <h1 style="font-size: 80px;">GEM OVER</h1>
            <p style="font-size: 30px;">Skor Kamu: <span id="final-score">0</span></p>
            <p style="margin-top: 20px;">Tekan SPACE untuk Main Lagi</p>
        </div>
    </div>

    <script>
        // audio
        const JUMP_SOUND = new Audio('musik/lompat.mp3'); 
        const CRASH_SOUND = new Audio('musik/kalah.wav'); 
        const BACKSOUND = new Audio('musik/sound.mp3'); 

        // Pastikan audio siap sebelum diputar (Preload)
        BACKSOUND.preload = 'auto';
        BACKSOUND.volume = 0.3;
        BACKSOUND.loop = true;

        JUMP_SOUND.volume = 0.5;
        CRASH_SOUND.volume = 0.7;

        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const timerElement = document.getElementById('timer');
        const gameContainer = document.getElementById('game-container');
        const gameOverScreen = document.getElementById('game-over');
        const startMsg = document.getElementById('start-msg');

        let isPlaying = false;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let startTime, gameSpeed, gameLoop, timerInterval;
        let obstacles = [];

        highScoreElement.innerText = highScore.toString().padStart(6, '0');

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            gameSpeed = 7;
            startTime = Date.now();
            
            // --- MATIKAN SUARA GAME OVER SEBELUM MULAI ---
            CRASH_SOUND.pause();
            CRASH_SOUND.currentTime = 0; 
            
            // --- MULAI MUSIK LATAR ---
            BACKSOUND.currentTime = 0; 
            BACKSOUND.play().catch(() => {
                console.log("Musik tertahan oleh kebijakan browser.");
            }); 
            
            startMsg.style.display = 'none';
            gameOverScreen.style.display = 'none';
            
            player.classList.remove('warmup');
            player.classList.add('running');
            
            timerInterval = setInterval(() => {
                let seconds = Math.floor((Date.now() - startTime) / 1000);
                timerElement.innerText = seconds + "s";
                gameSpeed += 0.15; 
            }, 1000);

            gameLoop = setInterval(update, 20);
            spawnObstacle();
        }

        function handleInput(type) {
            if (!isPlaying) {
                // Paksa browser mengizinkan audio dengan play-pause cepat
                BACKSOUND.play().then(() => {
                    // Jika berhasil play, langsung jalankan game
                    startGame();
                }).catch(() => {
                    // Jika gagal (karena kebijakan browser), tetap coba start game
                    startGame();
                });
                return;
            }

            if (type === 'up') {
                if (!player.classList.contains('jumping') && !player.classList.contains('sliding')) {
                    JUMP_SOUND.currentTime = 0;
                    JUMP_SOUND.play().catch(() => {});
                    
                    player.classList.remove('running');
                    player.classList.add('jumping');
                    
                    setTimeout(() => {
                        player.classList.remove('jumping');
                        if(isPlaying) player.classList.add('running');
                    }, 600);
                }
            } else if (type === 'down') {
                if (!player.classList.contains('jumping')) {
                    player.classList.add('sliding');
                    player.querySelector('i').className = 'fa-solid fa-person-falling';
                    
                    setTimeout(() => {
                        player.classList.remove('sliding');
                        player.querySelector('i').className = 'fas fa-running';
                    }, 500);
                }
            }
        }

        function update() {
            score++;
            scoreElement.innerText = score.toString().padStart(6, '0');

            // --- BARU: Gerakkan Bangunan (Efek Parallax) ---
            const city = document.getElementById('buildings');
            if (city) {
                // Angka 0.3 artinya bangunan bergerak 30% dari kecepatan rintangan
                // Ini menciptakan ilusi kedalaman (bangunan terasa jauh di belakang)
                let cityMove = (score * gameSpeed * 0.3) % window.innerWidth;
                city.style.transform = `translateX(-${cityMove}px)`;
            }

            obstacles.forEach((obs, index) => {
                let currentLeft = parseFloat(obs.style.left);
                obs.style.left = (currentLeft - gameSpeed) + 'px';

                if (isCollide(player, obs)) {
                    endGame();
                }

                if (currentLeft < -60) {
                    obs.remove();
                    obstacles.splice(index, 1);
                }
            });
        }

        function spawnObstacle() {
            if (!isPlaying) return;
            
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            
            let isAir = Math.random() > 0.5;
            
            // Ukuran rintangan dinamis di hp
            let size = window.innerWidth < 600 ? 35 : 50;
            obs.style.width = size + 'px';
            obs.style.height = size + 'px';
            
            obs.style.left = window.innerWidth + 'px';
            
            // Atur posisi rintangan berdasarkan tinggi layar
            if (isAir) {
                // Rintangan gantung (harus sleding)
                obs.style.bottom = '38%'; 
            } else {
                // Rintangan bawah (harus lompat)
                obs.style.bottom = '20%';
            }

            gameContainer.appendChild(obs);
            obstacles.push(obs);

            // Kecepatan munculnya rintangan
            let next = Math.random() * (2000 - gameSpeed * 40) + 800;
            setTimeout(spawnObstacle, Math.max(next, 600));
        } 

        function isCollide(a, b) {
            let aRect = a.getBoundingClientRect();
            let bRect = b.getBoundingClientRect();

            // Kita kecilkan hitbox sebanyak 10-15 pixel dari setiap sisi
            // supaya lebih akurat secara visual (terutama untuk rintangan bulat)
            let paddingWidth = aRect.width * 0.2;
            let paddingHeight = aRect.height * 0.2;

            return !(
                ((aRect.top + paddingHeight) > (bRect.bottom - paddingHeight)) ||
                ((aRect.bottom - paddingHeight) < (bRect.top + paddingHeight)) ||
                ((aRect.right - paddingWidth) < (bRect.left + paddingWidth)) ||
                ((aRect.left + paddingWidth) > (bRect.right - paddingWidth))
            );
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameLoop);
            clearInterval(timerInterval);
            
            // --- MATIKAN MUSIK SAAT KALAH ---
            BACKSOUND.pause(); 
            BACKSOUND.currentTime = 0; 
            
            CRASH_SOUND.currentTime = 0;
            CRASH_SOUND.play().catch(() => {});
            
            // sisa kode skor tinggi dsb tetap sama
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                highScoreElement.innerText = highScore.toString().padStart(6, '0');
            }

            document.getElementById('final-score').innerText = score;
            gameOverScreen.style.display = 'flex';
            
            obstacles.forEach(obs => obs.remove());
            obstacles = [];
            
            player.className = 'warmup';
            player.querySelector('i').className = 'fas fa-running';
        }

        // Kontrol
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') handleInput('up');
            if (e.code === 'ArrowDown') handleInput('down');
        });

        let touchY = 0;
        window.addEventListener('touchstart', (e) => {
            touchY = e.touches[0].clientY;
            if (!isPlaying) startGame();
        });

        window.addEventListener('touchend', (e) => {
            let diff = touchY - e.changedTouches[0].clientY;
            if (diff > 30) handleInput('up');
            if (diff < -30) handleInput('down');
        });
    </script>

</body>
</html>
